// ============================================================
//  Глобальная очередь задач для планировщика ОС
//
//  Архитектура:
//    ┌──────────────────────────────────────────────────┐
//    │            GlobalTaskQueue                       │
//    │  ┌────────┐  ┌────────┐  ┌────────┐             │
//    │  │RT ring │  │NQ ring │  │IQ ring │  (3 уровня) │
//    │  └────────┘  └────────┘  └────────┘             │
//    │       ↓ steal_batch(N)                          │
//    │  CPU0  CPU1  CPU2  ...  CPUN                    │
//    └──────────────────────────────────────────────────┘
//
//  Свойства:
//    - MPMC: любой CPU может пушить и забирать задачи
//    - Приоритеты: RT > Normal > Idle, всегда берём старший
//    - Lock-free выдача: fetch_add на head-указателе
//    - Backpressure: push блокируется если очередь полна
//    - Батчевая выдача: CPU забирает до BATCH_SIZE задач за раз
//    - no_std-совместимость: Arc/Box заменяемы на аллокатор ядра
// ============================================================

#![allow(dead_code)]

use std::cell::UnsafeCell;
use std::sync::atomic::{AtomicI64, AtomicU64, AtomicUsize, Ordering};
use std::sync::Arc;

// ── Константы ─────────────────────────────────────────────
/// Максимум задач в batch при steal_batch().
pub const BATCH_SIZE: usize = 16;

/// Ёмкость очередей по умолчанию (степень двойки).
pub const DEFAULT_RT_CAPACITY:     usize = 256;
pub const DEFAULT_NORMAL_CAPACITY: usize = 4096;
pub const DEFAULT_IDLE_CAPACITY:   usize = 1024;

// ── Cache line padding ─────────────────────────────────────
#[repr(align(64))]
struct Padded<T>(T);

impl<T> Padded<T> {
    #[inline] fn new(v: T) -> Self { Padded(v) }
    #[inline] fn get(&self) -> &T  { &self.0 }
}

// ── Приоритет задачи ──────────────────────────────────────
#[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord)]
#[repr(u8)]
pub enum Priority {
    Idle   = 0,
    Normal = 1,
    RealTime = 2,
}

// ── Дескриптор задачи ─────────────────────────────────────
// В реальном микроядре здесь будет *mut TCB (Thread Control Block).
// Мы используем структуру, чтобы показать поля, важные для шедулера.
#[derive(Debug, Clone)]
pub struct Task {
    /// Уникальный идентификатор задачи.
    pub id: u64,
    /// Приоритет — куда попадёт в GlobalTaskQueue.
    pub priority: Priority,
    /// Временна́я метка добавления (монотонные тики ядра).
    pub enqueue_tick: u64,
    /// Оставшийся квант времени в тиках.
    pub remaining_ticks: u32,
    /// Флаг: задача пришла из прерывания (не должна блокировать push).
    pub from_irq: bool,
}

impl Task {
    pub fn new(id: u64, priority: Priority, ticks: u32) -> Self {
        Task {
            id,
            priority,
            enqueue_tick: 0,
            remaining_ticks: ticks,
            from_irq: false,
        }
    }
}

// ── Слот ring buffer ──────────────────────────────────────
// sequence — «поколение» слота:
//   чётное (2k)   → слот свободен, producer может писать
//   нечётное (2k+1) → слот занят, consumer может читать
struct Slot<T> {
    sequence: AtomicI64,
    data: UnsafeCell<Option<T>>,
}

impl<T> Slot<T> {
    fn new(seq: i64) -> Self {
        Slot {
            sequence: AtomicI64::new(seq * 2), // начальное чётное поколение
            data: UnsafeCell::new(None),
        }
    }
}

unsafe impl<T: Send> Sync for Slot<T> {}
unsafe impl<T: Send> Send for Slot<T> {}

// ── MPMC Ring Buffer ──────────────────────────────────────
// Классическая реализация Dmitry Vyukov (1024cores.net).
// Каждый слот управляет своим доступом через sequence,
// никакого глобального lock'а нет.
//
// Протокол:
//   push: ждём sequence == pos*2     → пишем → sequence = pos*2 + 1
//   pop:  ждём sequence == pos*2 + 1 → читаем → sequence = (pos+cap)*2
struct MpmcRing<T> {
    slots:    Box<[Slot<T>]>,
    mask:     usize,
    capacity: usize,
    // Отдельные cache line для head/tail — критично при высоком contention.
    head: Padded<AtomicUsize>, // producer резервирует здесь
    tail: Padded<AtomicUsize>, // consumer резервирует здесь
}

impl<T> MpmcRing<T> {
    fn new(capacity: usize) -> Self {
        assert!(capacity.is_power_of_two(), "capacity must be power of two");
        let slots: Vec<Slot<T>> = (0..capacity)
            .map(|i| Slot::new(i as i64))
            .collect();
        MpmcRing {
            slots: slots.into_boxed_slice(),
            mask: capacity - 1,
            capacity,
            head: Padded::new(AtomicUsize::new(0)),
            tail: Padded::new(AtomicUsize::new(0)),
        }
    }

    /// Неблокирующий push.
    /// Возвращает Err(value) если очередь полна.
    fn try_push(&self, value: T) -> Result<(), T> {
        let mut pos = self.head.get().load(Ordering::Relaxed);
        loop {
            let slot = &self.slots[pos & self.mask];
            let seq  = slot.sequence.load(Ordering::Acquire);
            let diff = seq as isize - (pos * 2) as isize;

            if diff == 0 {
                // Слот свободен — пытаемся занять.
                match self.head.get().compare_exchange_weak(
                    pos, pos + 1,
                    Ordering::Relaxed, Ordering::Relaxed,
                ) {
                    Ok(_) => {
                        // Мы владеем слотом — пишем.
                        // Safety: CAS гарантирует эксклюзивный доступ.
                        unsafe { *slot.data.get() = Some(value); }
                        // Публикуем: делаем слот читаемым.
                        slot.sequence.store((pos * 2 + 1) as i64, Ordering::Release);
                        return Ok(());
                    }
                    Err(actual) => {
                        pos = actual;
                        continue;
                    }
                }
            } else if diff < 0 {
                // Очередь полна.
                return Err(value);
            } else {
                // Другой producer уже движется — обновляем pos.
                pos = self.head.get().load(Ordering::Relaxed);
            }
        }
    }

    /// Блокирующий push — спинит пока есть место.
    /// Использовать только не из interrupt context!
    fn push_spin(&self, mut value: T) {
        loop {
            match self.try_push(value) {
                Ok(()) => return,
                Err(v) => {
                    value = v;
                    std::hint::spin_loop();
                }
            }
        }
    }

    /// Неблокирующий pop одного элемента.
    fn try_pop(&self) -> Option<T> {
        let mut pos = self.tail.get().load(Ordering::Relaxed);
        loop {
            let slot = &self.slots[pos & self.mask];
            let seq  = slot.sequence.load(Ordering::Acquire);
            let diff = seq as isize - (pos * 2 + 1) as isize;

            if diff == 0 {
                // Слот готов к чтению.
                match self.tail.get().compare_exchange_weak(
                    pos, pos + 1,
                    Ordering::Relaxed, Ordering::Relaxed,
                ) {
                    Ok(_) => {
                        // Safety: мы владеем слотом для чтения.
                        let value = unsafe { (*slot.data.get()).take() };
                        // Освобождаем слот для следующего поколения.
                        slot.sequence.store(
                            ((pos + self.capacity) * 2) as i64,
                            Ordering::Release,
                        );
                        return value;
                    }
                    Err(actual) => {
                        pos = actual;
                        continue;
                    }
                }
            } else if diff < 0 {
                // Очередь пуста.
                return None;
            } else {
                pos = self.tail.get().load(Ordering::Relaxed);
            }
        }
    }

    /// Забрать до `max` элементов за один вызов.
    /// Возвращает количество реально забранных.
    fn pop_batch(&self, buf: &mut [Option<T>], max: usize) -> usize {
        let limit = max.min(buf.len());
        let mut count = 0;
        while count < limit {
            match self.try_pop() {
                Some(v) => { buf[count] = Some(v); count += 1; }
                None    => break,
            }
        }
        count
    }

    /// Примерное количество элементов (не точное из-за MPMC).
    fn len_approx(&self) -> usize {
        let h = self.head.get().load(Ordering::Relaxed);
        let t = self.tail.get().load(Ordering::Relaxed);
        h.saturating_sub(t)
    }

    fn is_empty(&self) -> bool {
        self.len_approx() == 0
    }
}

// ── Статистика очереди ────────────────────────────────────
#[derive(Debug, Default)]
pub struct QueueStats {
    pub tasks_pushed:    AtomicU64,
    pub tasks_popped:    AtomicU64,
    pub push_full_drops: AtomicU64, // задачи потеряны из-за переполнения
    pub steal_calls:     AtomicU64,
    pub empty_steals:    AtomicU64, // steal вернул 0 задач
}

// ── Одна очередь уровня приоритета ────────────────────────
struct PriorityQueue {
    ring:     MpmcRing<Task>,
    priority: Priority,
}

impl PriorityQueue {
    fn new(capacity: usize, priority: Priority) -> Self {
        PriorityQueue { ring: MpmcRing::new(capacity), priority }
    }
}

// ── GlobalTaskQueue — публичный API ───────────────────────
//
// Три очереди, опрашиваемые в порядке убывания приоритета:
//   RealTime → Normal → Idle
//
// CPU вызывает steal_batch() и получает срез задач.
// Любой поток (в т.ч. обработчик прерывания через try_push)
// может добавить задачу.
pub struct GlobalTaskQueue {
    rt:     PriorityQueue,
    normal: PriorityQueue,
    idle:   PriorityQueue,
    stats:  Arc<QueueStats>,
}

impl GlobalTaskQueue {
    /// Создать очереди с заданными ёмкостями.
    pub fn new(
        rt_cap:     usize,
        normal_cap: usize,
        idle_cap:   usize,
    ) -> Self {
        GlobalTaskQueue {
            rt:     PriorityQueue::new(rt_cap,     Priority::RealTime),
            normal: PriorityQueue::new(normal_cap, Priority::Normal),
            idle:   PriorityQueue::new(idle_cap,   Priority::Idle),
            stats:  Arc::new(QueueStats::default()),
        }
    }

    /// Создать с дефолтными размерами.
    pub fn default_sized() -> Self {
        Self::new(DEFAULT_RT_CAPACITY, DEFAULT_NORMAL_CAPACITY, DEFAULT_IDLE_CAPACITY)
    }

    // ── Push ──────────────────────────────────────────────

    /// Попытка добавить задачу без блокировки.
    /// Подходит для interrupt context.
    /// Возвращает Ok(()) или Err(task) если очередь полна.
    pub fn try_push(&self, mut task: Task) -> Result<(), Task> {
        task.enqueue_tick = current_tick();
        let ring = self.queue_for(task.priority);
        match ring.try_push(task) {
            Ok(()) => {
                self.stats.tasks_pushed.fetch_add(1, Ordering::Relaxed);
                Ok(())
            }
            Err(t) => {
                self.stats.push_full_drops.fetch_add(1, Ordering::Relaxed);
                Err(t)
            }
        }
    }

    /// Добавить задачу, спиня если очередь полна.
    /// Только для non-interrupt контекста.
    pub fn push(&self, mut task: Task) {
        task.enqueue_tick = current_tick();
        let ring = self.queue_for(task.priority);
        ring.push_spin(task);
        self.stats.tasks_pushed.fetch_add(1, Ordering::Relaxed);
    }

    // ── Steal batch ───────────────────────────────────────

    /// Основной метод для CPU: забрать batch задач.
    ///
    /// Алгоритм:
    ///   1. Сначала пробуем RT очередь — берём ВСЕ доступные (RT критичен).
    ///   2. Если RT пуста — берём до BATCH_SIZE из Normal.
    ///   3. Если Normal пуста — берём до BATCH_SIZE из Idle.
    ///   4. Возвращаем срез заполненных слотов.
    ///
    /// `buf` — буфер на стеке CPU (обычно [None; BATCH_SIZE]).
    /// Возвращает количество задач, помещённых в buf.
    pub fn steal_batch<'a>(
        &self,
        buf: &'a mut [Option<Task>; BATCH_SIZE],
    ) -> &'a [Option<Task>] {
        self.stats.steal_calls.fetch_add(1, Ordering::Relaxed);

        // RT: забираем всё что есть (не ограничиваем batch).
        let mut count = self.rt.ring.pop_batch(buf, BATCH_SIZE);

        // Normal: если RT был пуст.
        if count == 0 {
            count = self.normal.ring.pop_batch(buf, BATCH_SIZE);
        }

        // Idle: последний резерв.
        if count == 0 {
            count = self.idle.ring.pop_batch(buf, BATCH_SIZE);
        }

        if count == 0 {
            self.stats.empty_steals.fetch_add(1, Ordering::Relaxed);
        } else {
            self.stats.tasks_popped.fetch_add(count as u64, Ordering::Relaxed);
        }

        &buf[..count]
    }

    /// Вариант steal_batch с явным приоритетом —
    /// CPU может запросить только задачи конкретного уровня.
    pub fn steal_from<'a>(
        &self,
        priority: Priority,
        buf: &'a mut [Option<Task>; BATCH_SIZE],
    ) -> &'a [Option<Task>] {
        self.stats.steal_calls.fetch_add(1, Ordering::Relaxed);
        let ring = self.queue_for(priority);
        let count = ring.pop_batch(buf, BATCH_SIZE);
        self.stats.tasks_popped.fetch_add(count as u64, Ordering::Relaxed);
        &buf[..count]
    }

    // ── Диагностика ───────────────────────────────────────

    pub fn stats(&self) -> Arc<QueueStats> {
        self.stats.clone()
    }

    pub fn len(&self, p: Priority) -> usize {
        self.queue_for(p).len_approx()
    }

    pub fn is_empty(&self) -> bool {
        self.rt.ring.is_empty()
            && self.normal.ring.is_empty()
            && self.idle.ring.is_empty()
    }

    // ── Приватные хелперы ─────────────────────────────────

    #[inline]
    fn queue_for(&self, p: Priority) -> &MpmcRing<Task> {
        match p {
            Priority::RealTime => &self.rt.ring,
            Priority::Normal   => &self.normal.ring,
            Priority::Idle     => &self.idle.ring,
        }
    }
}

// GlobalTaskQueue безопасно шарится между потоками.
unsafe impl Send for GlobalTaskQueue {}
unsafe impl Sync for GlobalTaskQueue {}

// ── Монотонные тики (заглушка) ────────────────────────────
// В реальном ядре: читать TSC или счётчик таймера.
#[inline]
fn current_tick() -> u64 {
    static TICK: AtomicU64 = AtomicU64::new(0);
    TICK.fetch_add(1, Ordering::Relaxed)
}

// ── Симуляция CPU-воркера ─────────────────────────────────
// Показывает как CPU использует GlobalTaskQueue.
pub struct CpuWorker {
    pub cpu_id:    usize,
    pub queue:     Arc<GlobalTaskQueue>,
    // Локальный deque для задач, уже забранных из глобальной очереди.
    // В реальном ядре — per-CPU структура в памяти ядра.
    local_buf: [Option<Task>; BATCH_SIZE],
}

impl CpuWorker {
    pub fn new(cpu_id: usize, queue: Arc<GlobalTaskQueue>) -> Self {
        CpuWorker {
            cpu_id,
            queue,
            local_buf: [const { None }; BATCH_SIZE],
        }
    }

    /// Один «тик» планировщика: забрать batch и обработать.
    pub fn schedule_tick(&mut self) -> usize {
        let tasks = self.queue.steal_batch(&mut self.local_buf);
        let count = tasks.len();

        for slot in tasks {
            if let Some(task) = slot {
                self.run_task(task);
            }
        }

        // Сбрасываем буфер для следующего вызова.
        self.local_buf = [const { None }; BATCH_SIZE];

        count
    }

    fn run_task(&self, task: &Task) {
        // В реальном ядре: context switch, восстановление регистров и т.д.
        // Здесь просто логируем.
        println!(
            "  CPU{} ← {:?} task_id={} ticks={}",
            self.cpu_id, task.priority, task.id, task.remaining_ticks
        );
    }
}

// ─────────────────────────────────────────────────────────
// Тесты
// ─────────────────────────────────────────────────────────
#[cfg(test)]
mod tests {
    use super::*;
    use std::sync::atomic::AtomicUsize;
    use std::thread;

    // ── Тест 1: Приоритеты соблюдаются ────────────────────
    // RT задачи должны выдаваться первыми.
    #[test]
    fn priority_ordering() {
        let q = Arc::new(GlobalTaskQueue::default_sized());

        q.push(Task::new(1, Priority::Idle,     1));
        q.push(Task::new(2, Priority::Normal,   1));
        q.push(Task::new(3, Priority::RealTime, 1));
        q.push(Task::new(4, Priority::Normal,   1));
        q.push(Task::new(5, Priority::RealTime, 1));

        let mut buf = [const { None }; BATCH_SIZE];

        // Первый steal должен отдать оба RT.
        let batch = q.steal_batch(&mut buf);
        let ids: Vec<u64> = batch.iter()
            .filter_map(|t| t.as_ref().map(|t| t.id))
            .collect();
        assert!(ids.contains(&3), "RT task 3 not in first batch");
        assert!(ids.contains(&5), "RT task 5 not in first batch");

        // Второй steal — Normal.
        let batch = q.steal_batch(&mut buf);
        for slot in batch {
            if let Some(t) = slot {
                assert_eq!(t.priority, Priority::Normal);
            }
        }
    }

    // ── Тест 2: MPMC корректность ──────────────────────────
    // 4 producer'а × 1000 задач, 4 consumer'а, все должны забрать.
    #[test]
    fn mpmc_no_loss() {
        const PRODUCERS: usize = 4;
        const PER_PRODUCER: usize = 1000;
        const TOTAL: usize = PRODUCERS * PER_PRODUCER;

        let q = Arc::new(GlobalTaskQueue::new(128, 8192, 128));
        let received = Arc::new(AtomicUsize::new(0));

        // Producers
        let handles: Vec<_> = (0..PRODUCERS)
            .map(|pid| {
                let q = q.clone();
                thread::spawn(move || {
                    for i in 0..PER_PRODUCER {
                        let id = (pid * PER_PRODUCER + i) as u64;
                        q.push(Task::new(id, Priority::Normal, 1));
                    }
                })
            })
            .collect();

        // Consumers
        let consumer_handles: Vec<_> = (0..4)
            .map(|_| {
                let q = q.clone();
                let recv = received.clone();
                thread::spawn(move || {
                    let mut buf = [const { None }; BATCH_SIZE];
                    let mut local = 0usize;
                    while recv.load(Ordering::Relaxed) < TOTAL {
                        let batch = q.steal_batch(&mut buf);
                        local += batch.len();
                        recv.fetch_add(batch.len(), Ordering::Relaxed);
                        if batch.is_empty() {
                            std::hint::spin_loop();
                        }
                    }
                    local
                })
            })
            .collect();

        for h in handles { h.join().unwrap(); }
        for h in consumer_handles { h.join().unwrap(); }

        assert_eq!(received.load(Ordering::Relaxed), TOTAL);
    }

    // ── Тест 3: try_push при полной очереди ───────────────
    #[test]
    fn push_full_returns_err() {
        // Маленькая RT очередь — быстро переполнится.
        let q = GlobalTaskQueue::new(4, 64, 64);

        let mut pushed = 0;
        for i in 0..8u64 {
            match q.try_push(Task::new(i, Priority::RealTime, 1)) {
                Ok(()) => pushed += 1,
                Err(_) => break,
            }
        }
        // Должны влезть ровно 4 (capacity=4).
        assert_eq!(pushed, 4);
        assert!(q.stats().push_full_drops.load(Ordering::Relaxed) == 0);
    }

    // ── Тест 4: steal_from конкретного приоритета ──────────
    #[test]
    fn steal_from_priority() {
        let q = GlobalTaskQueue::default_sized();

        for i in 0..5u64 {
            q.push(Task::new(i,   Priority::Normal, 1));
            q.push(Task::new(100+i, Priority::Idle, 1));
        }

        let mut buf = [const { None }; BATCH_SIZE];

        // Steal только Idle — не должны попасть Normal.
        let batch = q.steal_from(Priority::Idle, &mut buf);
        for slot in batch {
            if let Some(t) = slot {
                assert_eq!(t.priority, Priority::Idle);
            }
        }
    }

    // ── Тест 5: статистика ────────────────────────────────
    #[test]
    fn stats_tracking() {
        let q = GlobalTaskQueue::default_sized();

        for i in 0..10u64 {
            q.push(Task::new(i, Priority::Normal, 1));
        }

        let mut buf = [const { None }; BATCH_SIZE];
        q.steal_batch(&mut buf);

        let s = q.stats();
        assert_eq!(s.tasks_pushed.load(Ordering::Relaxed), 10);
        assert!(s.tasks_popped.load(Ordering::Relaxed) > 0);
        assert!(s.steal_calls.load(Ordering::Relaxed) >= 1);
    }
}

// ─────────────────────────────────────────────────────────
// Демо: симуляция планировщика с несколькими CPU
// ─────────────────────────────────────────────────────────
fn main() {
    use std::thread;

    const CPU_COUNT:      usize = 4;
    const RT_TASKS:       usize = 8;
    const NORMAL_TASKS:   usize = 64;
    const IDLE_TASKS:     usize = 16;

    println!("=== Глобальная очередь задач планировщика ОС ===\n");
    println!("CPU cores:    {}", CPU_COUNT);
    println!("RT tasks:     {}", RT_TASKS);
    println!("Normal tasks: {}", NORMAL_TASKS);
    println!("Idle tasks:   {}\n", IDLE_TASKS);

    let queue = Arc::new(GlobalTaskQueue::default_sized());

    // ── Наполняем очередь ──────────────────────────────────
    // В ядре это делают системные вызовы, прерывания и wake-up'ы.
    {
        let q = queue.clone();
        thread::spawn(move || {
            let mut id = 0u64;

            for _ in 0..RT_TASKS {
                q.push(Task::new(id, Priority::RealTime, 2));
                id += 1;
            }
            for _ in 0..NORMAL_TASKS {
                q.push(Task::new(id, Priority::Normal, 10));
                id += 1;
            }
            for _ in 0..IDLE_TASKS {
                q.push(Task::new(id, Priority::Idle, 1));
                id += 1;
            }

            println!("Pusher: {} задач добавлено\n", id);
        }).join().unwrap();
    }

    println!("Очередь наполнена. Запускаем {} CPU-воркеров...\n", CPU_COUNT);

    // ── Запускаем CPU-воркеры ─────────────────────────────
    let total_processed = Arc::new(AtomicUsize::new(0));
    let total_tasks = RT_TASKS + NORMAL_TASKS + IDLE_TASKS;

    let handles: Vec<_> = (0..CPU_COUNT)
        .map(|cpu_id| {
            let q = queue.clone();
            let processed = total_processed.clone();
            thread::spawn(move || {
                let mut worker = CpuWorker::new(cpu_id, q.clone());
                let mut cpu_total = 0usize;

                loop {
                    let n = worker.schedule_tick();
                    cpu_total += n;
                    processed.fetch_add(n, Ordering::Relaxed);

                    if processed.load(Ordering::Relaxed) >= total_tasks {
                        break;
                    }
                    if n == 0 && q.is_empty() {
                        break;
                    }
                }

                println!("CPU{}: обработал {} задач", cpu_id, cpu_total);
                cpu_total
            })
        })
        .collect();

    for h in handles { h.join().unwrap(); }

    println!("\n=== Итого: {} / {} задач обработано ===",
        total_processed.load(Ordering::Relaxed),
        total_tasks
    );

    // ── Статистика ────────────────────────────────────────
    let s = queue.stats();
    println!("\n--- Статистика очереди ---");
    println!("tasks_pushed:    {}", s.tasks_pushed.load(Ordering::Relaxed));
    println!("tasks_popped:    {}", s.tasks_popped.load(Ordering::Relaxed));
    println!("steal_calls:     {}", s.steal_calls.load(Ordering::Relaxed));
    println!("empty_steals:    {}", s.empty_steals.load(Ordering::Relaxed));
    println!("full_drops:      {}", s.push_full_drops.load(Ordering::Relaxed));
}